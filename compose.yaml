version: '3'

services:
###> doctrine/doctrine-bundle ###
###< doctrine/doctrine-bundle ###

  mock-server:
    image: mockoon/cli:latest
    command: ["--data", "data", "--port", "3000"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 2
    volumes:
      - ./external-api.json:/data:readonly

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
